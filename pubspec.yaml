name: flutter_template
description: A Flutter project template with common dependencies.
publish_to: "none" # 防止意外发布到 pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter   

  #请求
  dio: ^5.9.1
  #屏幕适配
  flutter_screenutil: ^5.9.3
  # 本地存储
  get_storage: ^2.1.1
  # 状态管理
  get: ^4.7.3
  # 日志打印
  logger: ^2.6.2
  # 应用信息
  package_info_plus: ^9.0.0
  # 路径操作
  path_provider: ^2.1.5
  # 常用工具
  common_utils: ^2.1.0
  # 键盘监听
  flutter_keyboard_visibility: ^6.0.0
  #toast(只用loading 不用toast,不好用)
  flutter_smart_dialog: ^4.9.8+9
  # 富文本
  flutter_widget_from_html_core: ^0.17.0
  # 图片缓存
  cached_network_image: ^3.4.1
  # 权限申请
  permission_handler: ^12.0.1
  # 设备信息
  device_info_plus: ^12.3.0
  #常用多功能组件
  # bruno: ^3.4.3 (这个 全局配置有参数修改不生效，用下面git的)
  bruno: 
    git:
      url: https://github.com/LianjiaTech/bruno.git
  #自适应gridview
  dynamic_height_grid_view: ^0.0.4
  #图片选择
  # image_pickers: ^2.0.6 （这个ios 存在bug,高版本ios 相册打不开。用下面git的）
  image_pickers: 
    git:
      url: https://github.com/weifucheng1102/image_pickers.git
  #toast
  oktoast: ^3.4.0
  #轮播图
  card_swiper: ^3.0.1
  #刷新
  easy_refresh: ^3.4.0
  # 打开链接
  url_launcher: ^6.3.2
  # 解析html
  html: ^0.15.6
  # 二维码扫描
  qr_code_scanner_plus: ^2.1.1
  # 消除页面
  dismissible_page: ^1.0.2
  # 图片预览
  photo_view: ^0.14.0
  # 微信支付
  fluwx: ^5.7.5
  # 支付宝支付
  tobias: ^5.3.4




  








  # 常见 UI 组件
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 修改包名工具
  change_app_package_name: ^1.1.0

dependency_overrides: 
  # meta: 1.15.0
  intl: ^0.18.0  

flutter:
  uses-material-design: true
  
  #图片路径
  assets:
    - images/
  fonts:
    - family: PingFang
      fonts:
        - asset: fonts/PingFang-Regular.ttf
          weight: 400
        - asset: fonts/PingFang-Medium.ttf
          weight: 500
        - asset: fonts/PingFang-Semibold.ttf
          weight: 600
        - asset: fonts/PingFang-Bold.ttf
          weight: 700      
  

#微信支付配置
fluwx:
  app_id: ''
  debug_logging: true # Logging in debug mode.
  android:
#    interrupt_wx_request: true # Defaults to true.
#    flutter_activity: 'MainActivity' # Defaults to app's launcher
  ios:
    universal_link: https://xxxxx.com/iosApp/
#    scene_delegate: true # Defaults to false.
#    no_pay: true # Set to true to disable payment.
#    ignore_security: true # Set to true to disable security seetings.

#支付宝配置
tobias:
  url_scheme: tobiasexample
  ios:
    ignore_security: true
    universal_link: https://wwww.com/iosApp/      
