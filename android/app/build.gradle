plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
def buildDate = new Date().format("MMdd", TimeZone.getTimeZone("Asia/Shanghai"))

android {
    namespace = "com.app.flutter_template"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.app.flutter_template"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
           ndk {
            abiFilters   'arm64-v8a'//,"armeabi-v7a"
        }
    }
   signingConfigs {
       release {
           keyAlias = keystoreProperties['keyAlias']
           keyPassword = keystoreProperties['keyPassword']
           storeFile = file(keystoreProperties['storeFile'])
           storePassword = keystoreProperties['storePassword']
       }
     
   }
    buildTypes {
          release {
            signingConfig = signingConfigs.release
        }
         debug {
            
        }
    }
}

flutter {
    source = "../.."
}

android.applicationVariants.all { variant ->
    variant.outputs.all { output ->
        if (output.outputFileName?.endsWith(".apk")) {
            def apkVersionName = variant.versionName ?: flutter.versionName
            output.outputFileName = "app-${variant.buildType.name}-v${apkVersionName}-${buildDate}.apk"
        }
    }

    def assembleTask = variant.hasProperty("assembleProvider")
        ? variant.assembleProvider.get()
        : variant.assemble

    assembleTask.doLast {
        def flutterApkDir = new File("${project.buildDir}/outputs/flutter-apk")
        def apkVersionName = variant.versionName ?: flutter.versionName
        def flutterBaseName = "app"

        if (variant.flavorName != null && !variant.flavorName.isEmpty()) {
            flutterBaseName += "-${variant.flavorName.toLowerCase()}"
        }

        flutterBaseName += "-${variant.buildType.name}"

        def defaultFlutterApk = new File(flutterApkDir, "${flutterBaseName}.apk")
        if (defaultFlutterApk.exists()) {
            project.copy {
                from defaultFlutterApk
                into flutterApkDir
                rename { "${flutterBaseName}-v${apkVersionName}-${buildDate}.apk" }
            }
        }
    }
}